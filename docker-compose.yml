services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: facefeat
      POSTGRES_PASSWORD: facefeat
      POSTGRES_DB: facefeat
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U facefeat"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://facefeat:facefeat@db:5432/facefeat
    volumes:
      - ./logs:/app/logs
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "5500:80"
    volumes:
      - ./frontend/src:/usr/share/nginx/html:ro

volumes:
  postgres_data:
  uploads_data: