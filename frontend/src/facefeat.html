<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FaceFeat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <a class="logo" href="#">
      <svg aria-label="FaceFeat logo" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <circle cx="9"  cy="10" r="1.5" fill="currentColor" stroke="none"/>
        <circle cx="15" cy="10" r="1.5" fill="currentColor" stroke="none"/>
        <path d="M8.5 15c1 1.5 5 1.5 7 0" stroke-linecap="round"/>
      </svg>
      FaceFeat
    </a>
    <span class="header-meta" id="header-meta">No video loaded</span>
  </header>

  <!-- Main -->
  <main>

    <!-- Left: upload + video -->
    <section class="left-panel" aria-label="Video panel">

      <!-- Upload -->
      <div class="upload-zone">
        <label class="upload-label" for="file-input" id="upload-label"
               aria-label="Upload video file">
          <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M4 16.5V19a1 1 0 001 1h14a1 1 0 001-1v-2.5"/>
            <path d="M12 14.5V4.5M8.5 8l3.5-3.5L15.5 8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <p>Drop a video file or click to browse</p>
          <span>MP4, AVI, MOV · max 500 MB</span>
        </label>
        <input type="file" id="file-input" accept="video/*" aria-label="Choose video file"/>
        <button class="btn-upload" id="btn-upload" disabled>Process Video</button>
      </div>

      <!-- Status -->
      <div class="status-bar" role="status" aria-live="polite">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">Upload a video to begin</span>
      </div>

      <!-- Video player -->
      <div class="video-wrapper" id="video-wrapper">
        <div class="video-placeholder" id="video-placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
            <rect x="2" y="4" width="20" height="16" rx="3"/>
            <path d="M10 9l5 3-5 3V9z" fill="currentColor" stroke="none"/>
          </svg>
          <p>Processed video will appear here</p>
        </div>
        <video id="video-player" controls style="display:none"
               aria-label="Processed video with face detection overlay"></video>
      </div>

    </section>

    <!-- Right: ROI panel -->
    <aside class="right-panel" aria-label="Face ROI panel">
      <div class="panel-header">
        <span class="panel-title">Face Summary</span>
        <span class="panel-badge" id="face-count">—</span>
      </div>
      <div class="panel-body" id="panel-body">
        <div class="empty-state" id="roi-empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
          <p>Face data will appear after processing</p>
        </div>
        <div class="face-cards" id="face-cards" style="display:none"></div>
      </div>
    </aside>

  </main>
</div>

<script>
  const API = 'http://localhost:8000';

  // Color palette per face index
  const FACE_COLORS = ['#4ade80','#60a5fa','#f472b6','#fb923c','#a78bfa','#facc15'];

  // ── State ───────────────────────────────────────────────────────────────────
  let selectedFile = null;
  let currentVideoId = null;

  // ── DOM refs ────────────────────────────────────────────────────────────────
  const fileInput     = document.getElementById('file-input');
  const uploadLabel   = document.getElementById('upload-label');
  const btnUpload     = document.getElementById('btn-upload');
  const statusDot     = document.getElementById('status-dot');
  const statusText    = document.getElementById('status-text');
  const videoWrapper  = document.getElementById('video-wrapper');
  const videoPlayer   = document.getElementById('video-player');
  const videoPlaceholder = document.getElementById('video-placeholder');
  const headerMeta    = document.getElementById('header-meta');
  const faceCount     = document.getElementById('face-count');
  const roiEmpty      = document.getElementById('roi-empty');
  const faceCards     = document.getElementById('face-cards');
  const panelBody     = document.getElementById('panel-body');

  // ── Status helpers ──────────────────────────────────────────────────────────
  function setStatus(state, message) {
    statusDot.className = 'status-dot ' + (state || '');
    statusText.textContent = message;
  }

  // ── Drag & drop ─────────────────────────────────────────────────────────────
  uploadLabel.addEventListener('dragover', e => {
    e.preventDefault();
    uploadLabel.classList.add('drag-over');
  });
  uploadLabel.addEventListener('dragleave', () => uploadLabel.classList.remove('drag-over'));
  uploadLabel.addEventListener('drop', e => {
    e.preventDefault();
    uploadLabel.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f && f.type.startsWith('video/')) onFileSelected(f);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) onFileSelected(fileInput.files[0]);
  });

  function onFileSelected(file) {
    selectedFile = file;
    const mb = (file.size / 1024 / 1024).toFixed(1);
    setStatus('ready', `Ready — ${file.name} (${mb} MB)`);
    btnUpload.disabled = false;

    // Preview original locally while processing
    const url = URL.createObjectURL(file);
    videoPlayer.src = url;
    videoPlayer.style.display = 'block';
    videoPlaceholder.style.display = 'none';
    headerMeta.textContent = file.name;
  }

  // ── Upload & process ────────────────────────────────────────────────────────
  btnUpload.addEventListener('click', async () => {
    if (!selectedFile) return;

    btnUpload.disabled = true;
    setStatus('loading', 'Uploading video…');
    showSkeletonCards();

    try {
      const formData = new FormData();
      formData.append('file', selectedFile);

      const uploadRes = await fetch(`${API}/api/video/upload`, {
        method: 'POST',
        body: formData,
      });

      if (!uploadRes.ok) {
        const err = await uploadRes.json().catch(() => ({}));
        throw new Error(err.detail || `Upload failed (${uploadRes.status})`);
      }

      const uploadData = await uploadRes.json();
      currentVideoId = uploadData.video_id;

      setStatus('loading', 'Processing — detecting faces…');
      headerMeta.textContent = `ID: ${currentVideoId.slice(0, 8)}…`;

      // Poll until processed_path is set
      await pollUntilReady(currentVideoId);

    } catch (err) {
      setStatus('error', err.message);
      btnUpload.disabled = false;
      clearSkeletonCards();
    }
  });

async function pollUntilReady(videoId, attempts = 0) {
  if (attempts > 60) {
    setStatus('error', 'Processing timed out after 2 minutes');
    btnUpload.disabled = false;
    clearSkeletonCards();
    return;
  }

  try {
    const res = await fetch(`${API}/api/video/${videoId}/status`); // ← use a status endpoint
    if (res.ok) {
      const data = await res.json();
      if (data.status === 'done' || data.processed_path) {
        loadProcessedVideo(videoId);
        await fetchROI(videoId);
        return;
      }
    }
  } catch (_) { /* keep polling */ }

  setStatus('loading', `Processing… (${attempts * 2}s)`);
  await sleep(2000);
  await pollUntilReady(videoId, attempts + 1);
}

  function loadProcessedVideo(videoId) {
    const streamUrl = `${API}/api/video/${videoId}`;
    videoPlayer.src = streamUrl;
    videoPlayer.style.display = 'block';
    videoPlaceholder.style.display = 'none';
    setStatus('ready', 'Processing complete');
    headerMeta.textContent = `video_id: ${videoId.slice(0, 8)}…`;
    btnUpload.disabled = false;
  }

  // ── ROI fetch & render ──────────────────────────────────────────────────────
  async function fetchROI(videoId) {
    try {
      const res = await fetch(`${API}/api/video/${videoId}/roi?limit=1000`);
      if (!res.ok) throw new Error(`ROI fetch failed (${res.status})`);
      const data = await res.json();
      renderROI(data.summary || []);
    } catch (err) {
      clearSkeletonCards();
      setStatus('error', 'Could not load face data: ' + err.message);
    }
  }

  function renderROI(summary) {
    clearSkeletonCards();

    if (!summary.length) {
      roiEmpty.style.display = 'flex';
      faceCards.style.display = 'none';
      faceCount.textContent = '0 faces';
      return;
    }

    roiEmpty.style.display = 'none';
    faceCards.style.display = 'flex';
    faceCount.textContent = `${summary.length} face${summary.length > 1 ? 's' : ''}`;

    faceCards.innerHTML = '';
    summary.forEach((face, idx) => {
      faceCards.appendChild(buildFaceCard(face, idx));
    });
  }

  function buildFaceCard(face, idx) {
    const color = FACE_COLORS[idx % FACE_COLORS.length];
    const conf  = face.avg_confidence ?? 0;
    const confClass = conf >= 0.8 ? 'conf-high' : conf >= 0.5 ? 'conf-medium' : 'conf-low';

    const card = document.createElement('div');
    card.className = 'face-card';
    card.innerHTML = `
      <div class="face-card-header">
        <span class="face-card-title">
          <span class="face-dot" style="background:${color}"></span>
          Face ${face.face_index + 1}
        </span>
        <span class="conf-badge ${confClass}">${pct(conf)}</span>
      </div>

      <div class="metrics">
        ${metricBar('Smile',      face.avg_smile,       color)}
        ${metricBar('Blink L',    face.avg_blink_left,  '#60a5fa')}
        ${metricBar('Blink R',    face.avg_blink_right, '#60a5fa')}
        ${metricBar('Brow Raise', face.avg_brow_raise,  '#c084fc')}
      </div>

      <div class="divider"></div>

      <div class="pose-grid">
        ${poseItem('Pitch', face.avg_pitch)}
        ${poseItem('Yaw',   face.avg_yaw)}
        ${poseItem('Roll',  face.avg_roll)}
      </div>

      <div style="margin-top:var(--space-3); font-size:var(--text-xs); color:var(--text-faint); font-variant-numeric:tabular-nums;">
        ${face.frames_detected ?? '—'} frames detected
      </div>
    `;
    return card;
  }

  function metricBar(label, value, color) {
    const v = value != null ? value : 0;
    const w = Math.min(100, Math.max(0, v * 100)).toFixed(1);
    return `
      <div class="metric-row">
        <div class="metric-label">
          <span class="metric-name">${label}</span>
          <span class="metric-value">${value != null ? v.toFixed(3) : '—'}</span>
        </div>
        <div class="metric-bar-track">
          <div class="metric-bar-fill" style="width:${w}%; background:${color}"></div>
        </div>
      </div>
    `;
  }

  function poseItem(label, value) {
    const display = value != null ? `${value.toFixed(1)}°` : '—';
    return `
      <div class="pose-item">
        <div class="pose-item-label">${label}</div>
        <div class="pose-item-value">${display}</div>
      </div>
    `;
  }

  // ── Skeleton helpers ────────────────────────────────────────────────────────
  function showSkeletonCards() {
    roiEmpty.style.display = 'none';
    faceCards.style.display = 'flex';
    faceCards.innerHTML = [0, 1].map(() =>
      `<div class="skeleton skeleton-card"></div>`
    ).join('');
    faceCount.textContent = '…';
  }

  function clearSkeletonCards() {
    faceCards.innerHTML = '';
  }

  // ── Utilities ───────────────────────────────────────────────────────────────
  const pct  = v => `${(v * 100).toFixed(0)}%`;
  const sleep = ms => new Promise(r => setTimeout(r, ms));
</script>
</body>
</html>
